<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>el.js - Complete Examples</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>

<body>
    <div id="app"></div>
    <script type="module">
        import './el.js';

        el(document.body).css({ margin: '0', padding: '0', minHeight: '100vh', background: '#f3f4f6', fontFamily: 'system-ui, -apple-system, BlinkMacSystemFont, \u201CSegoe UI\u201D, sans-serif', color: '#111827' });

        // ============================================
        // 1. BASIC ELEMENT CREATION & ATTRIBUTES
        // ============================================
        const basicSection = el('div').css({ background: '#ffffff', borderRadius: '1rem', boxShadow: '0 25px 50px rgba(0,0,0,0.08)', padding: '1.5rem', margin: '1.5rem', border: '1px solid #e5e7eb' }).child([
            el('h2').css({ fontSize: '1.5rem', fontWeight: '700', color: '#1f2937', marginBottom: '1rem', paddingBottom: '0.5rem', borderBottom: '2px solid #3b82f6', display: 'flex', alignItems: 'center', gap: '0.5rem' }).child([
                el('i').class('fas fa-cube').css({ color: '#3b82f6' }),
                el('span').text('1. Basic Element Creation & Attributes')
            ]),
            
            // Creating different elements
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Various Elements:'),
                el('div').css({ display: 'grid', rowGap: '0.5rem' }).child([
                    el('p').css({ color: '#4b5563' }).text('This is a paragraph'),
                    el('span').css({ color: '#4b5563' }).text('This is a span '),
                    el('strong').css({ color: '#1f2937' }).text('Bold text '),
                    el('em').css({ color: '#4b5563' }).text('Italic text'),
                    el('br').get(),
                    el('a').href('https://example.com').text('Link to example.com').attr('target', '_blank')
                        .css({ color: '#2563eb', textDecoration: 'underline', transition: 'color 0.2s ease', hover: { color: '#1d4ed8' } }),
                    el('br').get(),
                    el('img').attr('src', 'https://via.placeholder.com/150').attr('alt', 'Placeholder')
                        .css({ borderRadius: '0.75rem', boxShadow: '0 10px 15px rgba(0,0,0,0.1)', marginTop: '0.5rem' }).width('150px').get()
                ])
            ]),
            
            // ID, classes, and attributes
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('ID, Classes & Attributes:'),
                el('div').id('unique-element').css({ background: 'linear-gradient(90deg, #eff6ff 0%, #e0e7ff 100%)', border: '2px solid #bfdbfe', borderRadius: '0.75rem', padding: '1rem', marginBottom: '0.75rem' }).attr('data-custom', 'value').child(
                    el('p').css({ color: '#374151' }).text('Element with ID, gradient background, and custom data attribute')
                ),
                el('button').css({ background: '#2563eb', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', boxShadow: '0 10px 15px rgba(0,0,0,0.1)', hover: { background: '#1d4ed8', boxShadow: '0 20px 25px rgba(0,0,0,0.15)' } }).text('Check Attributes').click(() => {
                    const elem = document.getElementById('unique-element');
                    logOutput('ID: ' + elem.id + ', data-custom: ' + elem.dataset.custom);
                })
            ])
        ]);

        // ============================================
        // 2. STYLING & CSS
        // ============================================
        const styleSection = el('div').css({ background: '#ffffff', borderRadius: '1rem', boxShadow: '0 25px 50px rgba(0,0,0,0.08)', padding: '1.5rem', margin: '1.5rem', border: '1px solid #e5e7eb' }).child([
            el('h2').css({ fontSize: '1.5rem', fontWeight: '700', color: '#1f2937', marginBottom: '1rem', paddingBottom: '0.5rem', borderBottom: '2px solid #8b5cf6', display: 'flex', alignItems: 'center', gap: '0.5rem' }).child([
                el('i').class('fas fa-palette').css({ color: '#8b5cf6' }),
                el('span').text('2. Styling & CSS')
            ]),
            
            // Individual style methods
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Style Methods:'),
                el('div').flex('row').wrap('wrap').gap('0.75rem').child([
                    el('div').text('Width & Height').width('200px').height('50px').background('#3b82f6').color('#fff')
                        .css({ display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: '0.75rem', boxShadow: '0 10px 15px rgba(0,0,0,0.1)', fontWeight: '500' }),
                    el('div').text('Border & Radius').border('2px solid #10b981').radius('12px')
                        .css({ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0.5rem 1rem', background: '#ecfdf5', color: '#047857', borderRadius: '0.75rem', fontWeight: '500' }),
                    el('div').text('Shadow').boxShadow('0 10px 25px rgba(0,0,0,0.2)')
                        .css({ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0.75rem 1.5rem', background: '#ffffff', borderRadius: '0.75rem', fontWeight: '500', color: '#374151' })
                ])
            ]),
            
            // CSS object method
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('CSS Object Method:'),
                el('div').text('Styled with object').css({
                    'background': 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    'color': 'white',
                    'padding': '24px',
                    'border-radius': '12px',
                    'font-size': '18px',
                    'text-align': 'center',
                    'box-shadow': '0 4px 15px rgba(102, 126, 234, 0.4)'
                })
            ]),
            
            // Animation demo
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Animation Demo:'),
                el('div').css({ fontWeight: '500', color: '#ffffff', borderRadius: '1rem', padding: '1.5rem', boxShadow: '0 25px 50px rgba(0,0,0,0.15)' }).css({
                    background: 'linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%)',
                    display: 'inline-block',
                    animation: {
                        name: 'slide-right',
                        duration: '1.5s',
                        timingFunction: 'ease-in-out',
                        iterationCount: 'infinite',
                        direction: 'alternate',
                        keyframes: {
                            '0%': { transform: 'translateX(0)' },
                            '100%': { transform: 'translateX(14px)' }
                        }
                    }
                }).text('Animated Card')
            ]),

            // Pseudo-element demo
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Pseudo-element Demo:'),
                el('button').text('Hover me').css({ position: 'relative', overflow: 'hidden', padding: '0.75rem 1.5rem', borderRadius: '1rem', color: '#ffffff', fontWeight: '600', transition: 'all 0.2s ease' }).css({
                    background: '#111827',
                    position: 'relative',
                    overflow: 'hidden',
                    display: 'inline-flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    zIndex: '10',
                    '&::before': {
                        content: '""',
                        position: 'absolute',
                        left: '0',
                        top: '0',
                        width: '100%',
                        height: '100%',
                        background: 'rgba(59,130,246,0.18)',
                        borderRadius: '14px',
                        pointerEvents: 'none',
                        zIndex: '0'
                    },
                    '&::after': {
                        content: '""',
                        position: 'absolute',
                        left: '8px',
                        top: '8px',
                        width: 'calc(100% - 16px)',
                        height: 'calc(100% - 16px)',
                        border: '2px solid rgba(255,255,255,0.18)',
                        borderRadius: '12px',
                        pointerEvents: 'none',
                        zIndex: '0'
                    },
                    '&:hover::before': {
                        background: 'rgba(59,130,246,0.36)'
                    },
                    '&:hover::after': {
                        borderColor: 'rgba(255,255,255,0.32)'
                    }
                })
            ]),
            
            // Flexbox
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Flexbox:'),
                el('div').flex('row').justify('center').items('center').gap('12px').css({ background: '#f3f4f6', padding: '1rem', borderRadius: '0.75rem' }).child([
                    el('div').text('Item 1').css({ background: '#ffffff', padding: '0.75rem 1.5rem', borderRadius: '0.75rem', boxShadow: '0 1px 2px rgba(0,0,0,0.05)', fontWeight: '500', color: '#374151' }),
                    el('div').text('Item 2').css({ background: '#ffffff', padding: '0.75rem 1.5rem', borderRadius: '0.75rem', boxShadow: '0 1px 2px rgba(0,0,0,0.05)', fontWeight: '500', color: '#374151' }),
                    el('div').text('Item 3').css({ background: '#ffffff', padding: '0.75rem 1.5rem', borderRadius: '0.75rem', boxShadow: '0 1px 2px rgba(0,0,0,0.05)', fontWeight: '500', color: '#374151' })
                ])
            ]),
            
            // Grid
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Grid:'),
                el('div').grid('repeat(3, 1fr)').gap('12px').css({ background: '#f3f4f6', padding: '1rem', borderRadius: '0.75rem' }).child([
                    el('div').text('1').css({ background: '#ffffff', padding: '1.5rem', textAlign: 'center', borderRadius: '0.75rem', boxShadow: '0 1px 2px rgba(0,0,0,0.05)', fontWeight: '700', color: '#374151' }),
                    el('div').text('2').css({ background: '#ffffff', padding: '1.5rem', textAlign: 'center', borderRadius: '0.75rem', boxShadow: '0 1px 2px rgba(0,0,0,0.05)', fontWeight: '700', color: '#374151' }),
                    el('div').text('3').css({ background: '#ffffff', padding: '1.5rem', textAlign: 'center', borderRadius: '0.75rem', boxShadow: '0 1px 2px rgba(0,0,0,0.05)', fontWeight: '700', color: '#374151' }),
                    el('div').text('4').css({ background: '#ffffff', padding: '1.5rem', textAlign: 'center', borderRadius: '0.75rem', boxShadow: '0 1px 2px rgba(0,0,0,0.05)', fontWeight: '700', color: '#374151' }),
                    el('div').text('5').css({ background: '#ffffff', padding: '1.5rem', textAlign: 'center', borderRadius: '0.75rem', boxShadow: '0 1px 2px rgba(0,0,0,0.05)', fontWeight: '700', color: '#374151' }),
                    el('div').text('6').css({ background: '#ffffff', padding: '1.5rem', textAlign: 'center', borderRadius: '0.75rem', boxShadow: '0 1px 2px rgba(0,0,0,0.05)', fontWeight: '700', color: '#374151' })
                ])
            ])
        ]);

        // ============================================
        // 3. EVENT HANDLING
        // ============================================
        const eventSection = el('div').css({ background: '#ffffff', borderRadius: '1rem', boxShadow: '0 25px 50px rgba(0,0,0,0.08)', padding: '1.5rem', margin: '1.5rem', border: '1px solid #e5e7eb' }).child([
            el('h2').css({ fontSize: '1.5rem', fontWeight: '700', color: '#1f2937', marginBottom: '1rem', paddingBottom: '0.5rem', borderBottom: '2px solid #22c55e', display: 'flex', alignItems: 'center', gap: '0.5rem' }).child([
                el('i').class('fas fa-mouse-pointer').css({ color: '#22c55e' }),
                el('span').text('3. Event Handling')
            ]),
            
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Click Events:'),
                el('div').flex('row').wrap('wrap').gap('0.5rem').child([
                    el('button').css({ background: '#2563eb', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', boxShadow: '0 10px 15px rgba(0,0,0,0.1)', hover: { background: '#1d4ed8', boxShadow: '0 20px 25px rgba(0,0,0,0.15)' } }).text('Click Me').click((e) => {
                        logOutput('Button clicked! Target: ' + e.target.tagName);
                    }),
                    el('button').css({ background: '#16a34a', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', boxShadow: '0 10px 15px rgba(0,0,0,0.1)', hover: { background: '#15803d', boxShadow: '0 20px 25px rgba(0,0,0,0.15)' } }).text('Double Click').dblclick(() => {
                        logOutput('Double clicked!');
                    })
                ])
            ]),
            
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Input Events:'),
                el('input').css({ boxSizing:'border-box', width:'100%', padding:'0.75rem 1rem', border:'1px solid #d1d5db', borderRadius:'0.75rem', outline:'none', transition:'box-shadow 0.2s ease', boxShadow:'0 0 0 0 transparent' })
                    .placeholder('Type here...').type('text').id('demo-input')
                    .input((e) => logOutput('Input: ' + e.target.value))
                    .change((e) => logOutput('Changed to: ' + e.target.value))
                    .keyup((e) => logOutput('Keyup: ' + e.key))
                    .keydown((e) => { if(e.key === 'Enter') logOutput('Enter pressed!'); })
            ]),
            
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Mouse Events:'),
                el('div').text('Hover over me!').id('hover-box').css({ background: '#ffffff', border: '2px solid #e5e7eb', borderRadius: '0.75rem', padding: '1rem', textAlign: 'center', fontWeight: '500', color: '#374151', cursor: 'pointer', transition: 'all 0.2s ease', boxShadow: '0 0 0 rgba(0,0,0,0)' })
                    .hover(
                        () => { document.getElementById('hover-box').style.background = '#d1fae5'; document.getElementById('hover-box').style.borderColor = '#86efac'; },
                        () => { document.getElementById('hover-box').style.background = '#ffffff'; document.getElementById('hover-box').style.borderColor = '#e5e7eb'; }
                    )
                    .mousedown(() => logOutput('Mouse down'))
                    .mouseup(() => logOutput('Mouse up'))
            ]),
            
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Form Submit:'),
                el('form').id('demo-form').css({ display:'grid', rowGap:'0.75rem' }).child([
                    el('input').css({ boxSizing:'border-box', width:'100%', padding:'0.75rem 1rem', border:'1px solid #d1d5db', borderRadius:'0.75rem', outline:'none', transition:'box-shadow 0.2s ease', boxShadow:'0 0 0 0 transparent' })
                        .type('text').name('username').placeholder('Username'),
                    el('input').css({ boxSizing:'border-box', width:'100%', padding:'0.75rem 1rem', border:'1px solid #d1d5db', borderRadius:'0.75rem', outline:'none', transition:'box-shadow 0.2s ease', boxShadow:'0 0 0 0 transparent' })
                        .type('email').name('email').placeholder('Email'),
                    el('button').css({ background: '#2563eb', color: '#fff', fontWeight: '500', padding: '0.5rem 1.5rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', boxShadow: '0 10px 15px rgba(0,0,0,0.1)', hover: { background: '#1d4ed8', boxShadow: '0 20px 25px rgba(0,0,0,0.15)' } }).type('submit').text('Submit')
                ]).submit((data) => {
                    logOutput('Form submitted: ' + JSON.stringify(data, null, 2));
                })
            ]),
            
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Custom Event (on):'),
                el('div').id('custom-event-box').text('Right-click me!').css({ background: '#ffffff', border: '2px solid #e5e7eb', borderRadius: '0.75rem', padding: '1rem', textAlign: 'center', fontWeight: '500', color: '#374151', cursor: 'context-menu' })
                    .contextmenu((e) => {
                        e.preventDefault();
                        logOutput('Custom context menu triggered!');
                    })
            ])
        ]);

        // ============================================
        // 4. DOM MANIPULATION
        // ============================================
        const domSection = el('div').css({ background: '#ffffff', borderRadius: '1rem', boxShadow: '0 25px 50px rgba(0,0,0,0.08)', padding: '1.5rem', margin: '1.5rem', border: '1px solid #e5e7eb' }).child([
            el('h2').css({ fontSize: '1.5rem', fontWeight: '700', color: '#1f2937', marginBottom: '1rem', paddingBottom: '0.5rem', borderBottom: '2px solid #f97316', display: 'flex', alignItems: 'center', gap: '0.5rem' }).child([
                el('i').class('fas fa-code').css({ color: '#f97316' }),
                el('span').text('4. DOM Manipulation')
            ]),
            
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Show/Hide/Toggle:'),
                el('div').id('toggle-target').text('Target Element').css({ background: 'linear-gradient(90deg, #eff6ff 0%, #e0e7ff 100%)', border: '1px solid #bfdbfe', borderRadius: '0.75rem', padding: '1rem', marginBottom: '0.75rem', textAlign: 'center', fontWeight: '500', color: '#374151' }),
                el('div').flex('row').wrap('wrap').gap('0.5rem').child([
                    el('button').css({ background: '#dc2626', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', hover: { background: '#b91c1c' } }).text('Hide').click(() => {
                        el(document.getElementById('toggle-target')).hide();
                    }),
                    el('button').css({ background: '#16a34a', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', hover: { background: '#15803d' } }).text('Show').click(() => {
                        el(document.getElementById('toggle-target')).show();
                    }),
                    el('button').css({ background: '#2563eb', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', hover: { background: '#1d4ed8' } }).text('Toggle').click(() => {
                        el(document.getElementById('toggle-target')).toggle();
                    })
                ])
            ]),
            
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Add/Remove/Toggle Class:'),
                el('div').id('class-target').text('Class Target').css({ background: '#ffffff', border: '1px solid #e5e7eb', borderRadius: '0.75rem', padding: '1rem', marginBottom: '0.75rem', textAlign: 'center', fontWeight: '500', color: '#374151', transition: 'all 0.2s ease' }),
                el('div').flex('row').wrap('wrap').gap('0.5rem').child([
                    el('button').css({ background: '#eab308', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', hover: { background: '#ca8a04' } }).text('Add highlight').click(() => {
                        el(document.getElementById('class-target')).css({ backgroundColor: '#fbbf24' });
                    }),
                    el('button').css({ background: '#6b7280', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', hover: { background: '#4b5563' } }).text('Remove highlight').click(() => {
                        el(document.getElementById('class-target')).css({ backgroundColor: '' });
                    }),
                    el('button').css({ background: '#7c3aed', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', hover: { background: '#6d28d9' } }).text('Toggle highlight').click(() => {
                        el(document.getElementById('class-target')).css({ backgroundColor: '#fbbf24' });
                    })
                ])
            ]),
            
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem', marginBottom: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Content Manipulation:'),
                el('div').id('content-target').html('<p>Original <b>HTML</b> content</p>').css({ background: '#ffffff', border: '1px solid #e5e7eb', borderRadius: '0.75rem', padding: '1rem', marginBottom: '0.75rem', color: '#374151' }),
                el('div').flex('row').wrap('wrap').gap('0.5rem').child([
                    el('button').css({ background: '#4f46e5', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', hover: { background: '#4338ca' } }).text('Set Text').click(() => {
                        el(document.getElementById('content-target')).text('Plain text content');
                    }),
                    el('button').css({ background: '#ec4899', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', hover: { background: '#db2777' } }).text('Set HTML').click(() => {
                        el(document.getElementById('content-target')).html('<em>Italic HTML</em>');
                    }),
                    el('button').css({ background: '#4b5563', color: '#fff', fontWeight: '500', padding: '0.5rem 1rem', borderRadius: '0.75rem', transition: 'all 0.2s ease', hover: { background: '#374151' } }).text('Clear').click(() => {
                        el(document.getElementById('content-target')).clear();
                    })
                ])
            ]),
            
            el('div').css({ background: '#f8fafc', borderRadius: '0.75rem', padding: '1rem' }).child([
                el('h3').css({ fontSize: '1.125rem', fontWeight: '600', color: '#374151', marginBottom: '0.75rem' }).text('Find & Traverse:'),
                el('div').id('parent-element').css({ background: '#ffffff', border: '1px solid #e5e7eb', borderRadius: '0.75rem', padding: '1rem', marginBottom: '0.75rem', display: 'grid', rowGap: '0.5rem' }).child([
                    el('p').css({ background: '#f8fafc', padding: '0.5rem', borderRadius: '0.75rem' }).text('First child'),
                    el('p').css({ background: '#f8fafc', padding: '0.5rem', borderRadius: '0.75rem' }).text('Second child'),
                    el('p').css({ background: '#f8fafc', padding: '0.5rem', borderRadius: '0.75rem' }).text('Third child')
                ]),
