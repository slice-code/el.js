<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>el.js - Complete Examples</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .highlight { background-color: #fbbf24 !important; }
        #output { white-space: pre-wrap; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <div id="app"></div>
    <script type="module">
        import el from './el.js';

        // ============================================
        // 1. BASIC ELEMENT CREATION & ATTRIBUTES
        // ============================================
        const basicSection = el('div').class('bg-white rounded-xl shadow-lg p-6 m-6 border border-gray-100').child([
            el('h2').class('text-2xl font-bold text-gray-800 mb-4 pb-2 border-b-2 border-blue-500 flex items-center gap-2').child([
                el('i').class('fas fa-cube text-blue-500'),
                el('span').text('1. Basic Element Creation & Attributes')
            ]),
            
            // Creating different elements
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Various Elements:'),
                el('div').class('space-y-2').child([
                    el('p').class('text-gray-600').text('This is a paragraph'),
                    el('span').class('text-gray-600').text('This is a span '),
                    el('strong').class('text-gray-800').text('Bold text '),
                    el('em').class('text-gray-600').text('Italic text'),
                    el('br').get(),
                    el('a').href('https://example.com').text('Link to example.com').attr('target', '_blank')
                        .class('text-blue-600 hover:text-blue-800 underline transition-colors'),
                    el('br').get(),
                    el('img').attr('src', 'https://via.placeholder.com/150').attr('alt', 'Placeholder')
                        .class('rounded-lg shadow-md mt-2').width('150px').get()
                ])
            ]),
            
            // ID, classes, and attributes
            el('div').class('bg-gray-50 rounded-lg p-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('ID, Classes & Attributes:'),
                el('div').id('unique-element').class('bg-gradient-to-r from-blue-50 to-indigo-50 border-2 border-blue-200 rounded-lg p-4 mb-3').attr('data-custom', 'value').child(
                    el('p').class('text-gray-700').text('Element with ID, gradient background, and custom data attribute')
                ),
                el('button').class('bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg').text('Check Attributes').click(() => {
                    const elem = document.getElementById('unique-element');
                    logOutput('ID: ' + elem.id + ', data-custom: ' + elem.dataset.custom);
                })
            ])
        ]);

        // ============================================
        // 2. STYLING & CSS
        // ============================================
        const styleSection = el('div').class('bg-white rounded-xl shadow-lg p-6 m-6 border border-gray-100').child([
            el('h2').class('text-2xl font-bold text-gray-800 mb-4 pb-2 border-b-2 border-purple-500 flex items-center gap-2').child([
                el('i').class('fas fa-palette text-purple-500'),
                el('span').text('2. Styling & CSS')
            ]),
            
            // Individual style methods
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Style Methods:'),
                el('div').class('flex flex-wrap gap-3').child([
                    el('div').text('Width & Height').width('200px').height('50px').background('#3b82f6').color('#fff')
                        .class('flex items-center justify-center rounded-lg shadow-md font-medium'),
                    el('div').text('Border & Radius').border('2px solid #10b981').radius('12px')
                        .class('flex items-center justify-center px-4 py-2 bg-green-50 text-green-700 font-medium'),
                    el('div').text('Shadow').boxShadow('0 10px 25px rgba(0,0,0,0.2)')
                        .class('flex items-center justify-center px-6 py-3 bg-white rounded-lg font-medium text-gray-700')
                ])
            ]),
            
            // CSS object method
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('CSS Object Method:'),
                el('div').text('Styled with object').class('font-medium').css({
                    'background': 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    'color': 'white',
                    'padding': '24px',
                    'border-radius': '12px',
                    'font-size': '18px',
                    'text-align': 'center',
                    'box-shadow': '0 4px 15px rgba(102, 126, 234, 0.4)'
                })
            ]),
            
            // Flexbox
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Flexbox:'),
                el('div').flex('row').justify('center').items('center').gap('12px').class('bg-gray-100 p-4 rounded-lg').child([
                    el('div').text('Item 1').class('bg-white px-6 py-3 rounded-lg shadow-sm font-medium text-gray-700'),
                    el('div').text('Item 2').class('bg-white px-6 py-3 rounded-lg shadow-sm font-medium text-gray-700'),
                    el('div').text('Item 3').class('bg-white px-6 py-3 rounded-lg shadow-sm font-medium text-gray-700')
                ])
            ]),
            
            // Grid
            el('div').class('bg-gray-50 rounded-lg p-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Grid:'),
                el('div').grid('repeat(3, 1fr)').gap('12px').class('bg-gray-100 p-4 rounded-lg').child([
                    el('div').text('1').class('bg-white p-6 text-center rounded-lg shadow-sm font-bold text-gray-700'),
                    el('div').text('2').class('bg-white p-6 text-center rounded-lg shadow-sm font-bold text-gray-700'),
                    el('div').text('3').class('bg-white p-6 text-center rounded-lg shadow-sm font-bold text-gray-700'),
                    el('div').text('4').class('bg-white p-6 text-center rounded-lg shadow-sm font-bold text-gray-700'),
                    el('div').text('5').class('bg-white p-6 text-center rounded-lg shadow-sm font-bold text-gray-700'),
                    el('div').text('6').class('bg-white p-6 text-center rounded-lg shadow-sm font-bold text-gray-700')
                ])
            ])
        ]);

        // ============================================
        // 3. EVENT HANDLING
        // ============================================
        const eventSection = el('div').class('bg-white rounded-xl shadow-lg p-6 m-6 border border-gray-100').child([
            el('h2').class('text-2xl font-bold text-gray-800 mb-4 pb-2 border-b-2 border-green-500 flex items-center gap-2').child([
                el('i').class('fas fa-mouse-pointer text-green-500'),
                el('span').text('3. Event Handling')
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Click Events:'),
                el('div').class('flex flex-wrap gap-2').child([
                    el('button').class('bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg').text('Click Me').click((e) => {
                        logOutput('Button clicked! Target: ' + e.target.tagName);
                    }),
                    el('button').class('bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg').text('Double Click').dblclick(() => {
                        logOutput('Double clicked!');
                    })
                ])
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Input Events:'),
                el('input').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all')
                    .placeholder('Type here...').type('text').id('demo-input')
                    .input((e) => logOutput('Input: ' + e.target.value))
                    .change((e) => logOutput('Changed to: ' + e.target.value))
                    .keyup((e) => logOutput('Keyup: ' + e.key))
                    .keydown((e) => { if(e.key === 'Enter') logOutput('Enter pressed!'); })
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Mouse Events:'),
                el('div').text('Hover over me!').class('bg-white border-2 border-gray-200 rounded-lg p-4 text-center font-medium text-gray-700 cursor-pointer transition-all duration-200 hover:shadow-md').id('hover-box')
                    .hover(
                        () => { document.getElementById('hover-box').classList.add('bg-green-50', 'border-green-300'); },
                        () => { document.getElementById('hover-box').classList.remove('bg-green-50', 'border-green-300'); }
                    )
                    .mousedown(() => logOutput('Mouse down'))
                    .mouseup(() => logOutput('Mouse up'))
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Form Submit:'),
                el('form').id('demo-form').class('space-y-3').child([
                    el('input').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none')
                        .type('text').name('username').placeholder('Username'),
                    el('input').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none')
                        .type('email').name('email').placeholder('Email'),
                    el('button').class('bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg').type('submit').text('Submit')
                ]).submit((data) => {
                    logOutput('Form submitted: ' + JSON.stringify(data, null, 2));
                })
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Custom Event (on):'),
                el('div').id('custom-event-box').text('Right-click me!').class('bg-white border-2 border-gray-200 rounded-lg p-4 text-center font-medium text-gray-700 cursor-context-menu')
                    .contextmenu((e) => {
                        e.preventDefault();
                        logOutput('Custom context menu triggered!');
                    })
            ])
        ]);

        // ============================================
        // 4. DOM MANIPULATION
        // ============================================
        const domSection = el('div').class('bg-white rounded-xl shadow-lg p-6 m-6 border border-gray-100').child([
            el('h2').class('text-2xl font-bold text-gray-800 mb-4 pb-2 border-b-2 border-orange-500 flex items-center gap-2').child([
                el('i').class('fas fa-code text-orange-500'),
                el('span').text('4. DOM Manipulation')
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Show/Hide/Toggle:'),
                el('div').id('toggle-target').text('Target Element').class('bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 rounded-lg p-4 mb-3 text-center font-medium text-gray-700'),
                el('div').class('flex flex-wrap gap-2').child([
                    el('button').class('bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Hide').click(() => {
                        el(document.getElementById('toggle-target')).hide();
                    }),
                    el('button').class('bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Show').click(() => {
                        el(document.getElementById('toggle-target')).show();
                    }),
                    el('button').class('bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Toggle').click(() => {
                        el(document.getElementById('toggle-target')).toggle();
                    })
                ])
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Add/Remove/Toggle Class:'),
                el('div').id('class-target').text('Class Target').class('bg-white border border-gray-200 rounded-lg p-4 mb-3 text-center font-medium text-gray-700 transition-all duration-200'),
                el('div').class('flex flex-wrap gap-2').child([
                    el('button').class('bg-yellow-500 hover:bg-yellow-600 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Add highlight').click(() => {
                        el(document.getElementById('class-target')).class('highlight');
                    }),
                    el('button').class('bg-gray-500 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Remove highlight').click(() => {
                        el(document.getElementById('class-target')).removeClass('highlight');
                    }),
                    el('button').class('bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Toggle highlight').click(() => {
                        el(document.getElementById('class-target')).toggleClass('highlight');
                    })
                ])
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Content Manipulation:'),
                el('div').id('content-target').html('<p>Original <b>HTML</b> content</p>').class('bg-white border border-gray-200 rounded-lg p-4 mb-3 text-gray-700'),
                el('div').class('flex flex-wrap gap-2').child([
                    el('button').class('bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Set Text').click(() => {
                        el(document.getElementById('content-target')).text('Plain text content');
                    }),
                    el('button').class('bg-pink-600 hover:bg-pink-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Set HTML').click(() => {
                        el(document.getElementById('content-target')).html('<em>Italic HTML</em>');
                    }),
                    el('button').class('bg-gray-600 hover:bg-gray-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Clear').click(() => {
                        el(document.getElementById('content-target')).clear();
                    })
                ])
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Find & Traverse:'),
                el('div').id('parent-element').class('bg-white border border-gray-200 rounded-lg p-4 mb-3 space-y-2').child([
                    el('p').class('child-1 bg-gray-50 p-2 rounded').text('First child'),
                    el('p').class('child-2 bg-gray-50 p-2 rounded').text('Second child'),
                    el('p').class('child-3 bg-gray-50 p-2 rounded').text('Third child')
                ]),
                el('div').class('flex flex-wrap gap-2').child([
                    el('button').class('bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Find .child-2').click(() => {
                        const found = el(document.getElementById('parent-element')).find('.child-2');
                        if(found) {
                            found.class('highlight');
                            logOutput('Found: ' + found.get().textContent);
                        }
                    }),
                    el('button').class('bg-cyan-600 hover:bg-cyan-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('First Child').click(() => {
                        const first = el(document.getElementById('parent-element')).first();
                        if(first) logOutput('First: ' + first.get().textContent);
                    }),
                    el('button').class('bg-sky-600 hover:bg-sky-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('All Children').click(() => {
                        const children = el(document.getElementById('parent-element')).getChildren();
                        logOutput('Children count: ' + children.length);
                    })
                ])
            ])
        ]);

        // ============================================
        // 5. FORM ELEMENTS
        // ============================================
        const formSection = el('div').class('bg-white rounded-xl shadow-lg p-6 m-6 border border-gray-100').child([
            el('h2').class('text-2xl font-bold text-gray-800 mb-4 pb-2 border-b-2 border-pink-500 flex items-center gap-2').child([
                el('i').class('fas fa-edit text-pink-500'),
                el('span').text('5. Form Elements')
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Input Types:'),
                el('div').class('grid grid-cols-1 md:grid-cols-2 gap-3').child([
                    el('input').type('text').placeholder('Text input').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none').value('Default text'),
                    el('input').type('password').placeholder('Password').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none'),
                    el('input').type('email').placeholder('Email').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none'),
                    el('input').type('number').placeholder('Number').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none'),
                    el('input').type('date').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none'),
                    el('div').class('flex items-center gap-2').child([
                        el('input').type('checkbox').checked(true).class('w-5 h-5 text-pink-600 rounded focus:ring-pink-500').get(),
                        el('label').class('text-gray-700').text('Checkbox')
                    ]),
                    el('div').class('flex items-center gap-4').child([
                        el('div').class('flex items-center gap-2').child([
                            el('input').type('radio').name('radio-group').class('w-5 h-5 text-pink-600 focus:ring-pink-500').get(),
                            el('label').class('text-gray-700').text('Radio 1')
                        ]),
                        el('div').class('flex items-center gap-2').child([
                            el('input').type('radio').name('radio-group').class('w-5 h-5 text-pink-600 focus:ring-pink-500').get(),
                            el('label').class('text-gray-700').text('Radio 2')
                        ])
                    ])
                ])
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Select & Textarea:'),
                el('select').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none mb-3').child([
                    el('option').value('').text('Choose...'),
                    el('option').value('1').text('Option 1'),
                    el('option').value('2').text('Option 2'),
                    el('option').value('3').text('Option 3')
                ]).change((e) => logOutput('Selected: ' + e.target.value)),
                el('textarea').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none resize-none').placeholder('Textarea...').height('100px')
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Disabled & Required:'),
                el('div').class('grid grid-cols-1 md:grid-cols-2 gap-3').child([
                    el('input').class('w-full px-4 py-2 bg-gray-100 border border-gray-300 rounded-lg text-gray-500 cursor-not-allowed').placeholder('Disabled input').disabled(true),
                    el('input').class('w-full px-4 py-2 border-2 border-red-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none').placeholder('Required input').required()
                ])
            ])
        ]);

        // ============================================
        // 6. SVG SUPPORT
        // ============================================
        const svgSection = el('div').class('bg-white rounded-xl shadow-lg p-6 m-6 border border-gray-100').child([
            el('h2').class('text-2xl font-bold text-gray-800 mb-4 pb-2 border-b-2 border-indigo-500 flex items-center gap-2').child([
                el('i').class('fas fa-shapes text-indigo-500'),
                el('span').text('6. SVG Support')
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('SVG Elements:'),
                el('div').class('flex justify-center').child(
                    el('svg').attr('width', '200').attr('height', '200').attr('viewBox', '0 0 200 200').class('drop-shadow-lg').child([
                        el('circle').attr('cx', '100').attr('cy', '100').attr('r', '80').attr('fill', '#4f46e5'),
                        el('rect').attr('x', '70').attr('y', '70').attr('width', '60').attr('height', '60').attr('fill', '#fff').attr('rx', '8'),
                        el('text').attr('x', '100').attr('y', '110').attr('text-anchor', 'middle').attr('fill', '#4f46e5').attr('font-size', '24').attr('font-weight', 'bold').text('SVG')
                    ])
                )
            ])
        ]);

        // ============================================
        // 7. UTILITY METHODS
        // ============================================
        const utilitySection = el('div').class('bg-white rounded-xl shadow-lg p-6 m-6 border border-gray-100').child([
            el('h2').class('text-2xl font-bold text-gray-800 mb-4 pb-2 border-b-2 border-teal-500 flex items-center gap-2').child([
                el('i').class('fas fa-tools text-teal-500'),
                el('span').text('7. Utility Methods')
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Getters:'),
                el('div').id('getter-demo').class('bg-white border border-gray-200 rounded-lg p-4 mb-3').attr('data-test', '123').child(
                    el('p').class('text-gray-700').text('Demo content for getters')
                ),
                el('div').class('flex flex-wrap gap-2').child([
                    el('button').class('bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Get HTML').click(() => {
                        const html = el(document.getElementById('getter-demo')).getHtml();
                        logOutput('HTML: ' + html.substring(0, 100) + '...');
                    }),
                    el('button').class('bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Get Text').click(() => {
                        const text = el(document.getElementById('getter-demo')).getText();
                        logOutput('Text: ' + text);
                    }),
                    el('button').class('bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Get data-test').click(() => {
                        const data = el(document.getElementById('getter-demo')).getData('test');
                        logOutput('data-test: ' + data);
                    }),
                    el('button').class('bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Get Dimensions').click(() => {
                        const elem = el(document.getElementById('getter-demo'));
                        logOutput('Width: ' + elem.getWidth() + ', Height: ' + elem.getHeight());
                    })
                ])
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4 mb-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Focus & Scroll:'),
                el('input').id('focus-input').class('w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none mb-3').placeholder('Focus target'),
                el('div').class('flex flex-wrap gap-2').child([
                    el('button').class('bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Focus').click(() => {
                        el(document.getElementById('focus-input')).focus();
                    }),
                    el('button').class('bg-gray-600 hover:bg-gray-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200').text('Blur').click(() => {
                        el(document.getElementById('focus-input')).blur();
                    })
                ])
            ]),
            
            el('div').class('bg-gray-50 rounded-lg p-4').child([
                el('h3').class('text-lg font-semibold text-gray-700 mb-3').text('Loop Function (Auto-stop when removed):'),
                el('div').id('loop-counter').text('Counter: 0').class('bg-gradient-to-r from-teal-50 to-cyan-50 border border-teal-200 rounded-lg p-4 mb-3 text-center font-bold text-teal-700 text-xl'),
                el('button').class('bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg').text('Remove Counter').click(() => {
                    document.getElementById('loop-counter').remove();
                })
            ])
        ]);

        // ============================================
        // OUTPUT CONSOLE
        // ============================================
        const outputSection = el('div').class('bg-gray-900 rounded-xl shadow-lg p-6 m-6 border border-gray-700').child([
            el('h2').class('text-2xl font-bold text-white mb-4 pb-2 border-b-2 border-gray-600 flex items-center gap-2').child([
                el('i').class('fas fa-terminal text-green-400'),
                el('span').text('Output Console')
            ]),
            el('button').class('bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200 mb-4').text('Clear Output').click(() => {
                document.getElementById('output').textContent = '';
            }),
            el('div').id('output').class('bg-black rounded-lg p-4 font-mono text-sm text-green-400 h-48 overflow-y-auto border border-gray-700').text('// Output will appear here...')
        ]);

        // ============================================
        // BUILD APP
        // ============================================
        const app = el('div').class('min-h-screen pb-8').child([
            // Header
            el('header').class('bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 text-white py-8 shadow-lg').child([
                el('div').class('container mx-auto px-6 text-center').child([
                    el('h1').class('text-4xl md:text-5xl font-bold mb-2').text('el.js'),
                    el('p').class('text-xl text-blue-100').text('Complete Examples with Tailwind CSS')
                ])
            ]),
            
            // Content
            el('main').class('container mx-auto max-w-5xl').child([
                basicSection,
                styleSection,
                eventSection,
                domSection,
                formSection,
                svgSection,
                utilitySection,
                outputSection
            ]),
            
            // Footer
            el('footer').class('bg-gray-800 text-gray-400 py-6 mt-8 text-center').child(
                el('p').text('Built with el.js and Tailwind CSS')
            )
        ]);

        // Mount to DOM
        document.getElementById('app').appendChild(app.get());

        // Helper function for output
        function logOutput(message) {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            output.textContent += `[${timestamp}] ${message}\n`;
            output.scrollTop = output.scrollHeight;
        }

        // Initialize loop function demo
        el(document.getElementById('loop-counter')).loopFunc((element) => {
            const current = parseInt(element.textContent.replace('Counter: ', ''));
            element.textContent = 'Counter: ' + (current + 1);
        }, 1000);

        // Log ready
        logOutput('el.js examples loaded successfully with Tailwind CSS!');
    </script>
</body>

</html>
